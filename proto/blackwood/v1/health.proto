syntax = "proto3";

package blackwood.v1;

option go_package = "github.com/csweichel/blackwood/gen/blackwood/v1;blackwoodv1";

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
}

service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse) {}
}
