# Blackwood Configuration
# Usage: blackwood --config blackwood.yaml

server:
  addr: ":8080"
  data_dir: ~/.blackwood
  # TLS (optional) — serve over HTTPS
  # tls:
  #   cert_file: /path/to/cert.pem
  #   key_file: /path/to/key.pem

openai:
  # Path to a file containing your OpenAI API key
  # Used for OCR, transcription, and vision. Chat/search use Codex below.
  api_key_file: ~/.blackwood/secrets/openai-api-key
  model: gpt-5.2
  embedding_model: text-embedding-3-small
  # ocr_prompt: "Custom OCR prompt here"

# Codex-backed chat and search (optional)
# Requires the codex CLI to be installed and logged in.
# Codex runs in ~/.blackwood/notes with a read-only sandbox.
# codex:
#   enabled: true               # omit for auto-detect, false to disable
#   path: codex
#   timeout: 2m
#   max_corpus_bytes: 10485760
#   max_output_bytes: 1048576
#   extra_args: []

# WhatsApp integration (optional)
# whatsapp:
#   verify_token: your-verify-token
#   app_secret_file: ~/.blackwood/secrets/whatsapp-app-secret
#   access_token_file: ~/.blackwood/secrets/whatsapp-access-token
#   phone_number_id: "123456789"

# Telegram bot (optional)
# telegram:
#   bot_token_file: ~/.blackwood/secrets/telegram-bot-token
#   allowed_chat_ids:
#     - 123456789

# Granola meeting notes via MCP (optional)
# Run `blackwood granola-login` to obtain an OAuth token.
# granola:
#   oauth_token_file: ~/.blackwood/secrets/granola-oauth-token
#   poll_interval: 1h

# Authentication (optional)
# auth:
#   totp:
#     enabled: true

# File watcher (optional)
# watcher:
#   watch_dirs:
#     - /path/to/viwoods/notes
#     - /path/to/obsidian/vault
#   poll_interval: 30s
