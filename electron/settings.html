<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 32px 28px;
      -webkit-app-region: drag;
      user-select: none;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      -webkit-app-region: no-drag;
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #555; }
    .actions {
      -webkit-app-region: no-drag;
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    button {
      padding: 7px 18px;
      font-size: 13px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-save {
      background: #fff;
      color: #111;
    }
    .btn-save:hover { background: #ddd; }
    .btn-cancel {
      background: #333;
      color: #ccc;
    }
    .btn-cancel:hover { background: #444; }
  </style>
</head>
<body>
  <h2>Blackwood Settings</h2>
  <label for="url">Server URL</label>
  <input type="url" id="url" placeholder="http://localhost:8090" spellcheck="false" autocomplete="off">
  <div class="actions">
    <button class="btn-cancel" id="cancel">Cancel</button>
    <button class="btn-save" id="save">Save</button>
  </div>
  <script>
    const urlInput = document.getElementById("url");
    const saveBtn = document.getElementById("save");
    const cancelBtn = document.getElementById("cancel");

    window.blackwood.getConfig().then((cfg) => {
      urlInput.value = cfg.url || "";
      urlInput.select();
    });

    saveBtn.addEventListener("click", async () => {
      const url = urlInput.value.trim().replace(/\/+$/, "");
      if (!url) return;
      await window.blackwood.saveConfig({ url });
      window.close();
    });

    cancelBtn.addEventListener("click", () => window.close());

    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") saveBtn.click();
      if (e.key === "Escape") window.close();
    });
  </script>
</body>
</html>
